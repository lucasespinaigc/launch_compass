<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass - Nova Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a96e;
      --gold-light: #e4cfa0;
      --dark: #0a0a0f;
      --dark-surface: #12121a;
      --text: #e8e6e1;
      --text-muted: #8a8a95;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 169, 110, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 169, 110, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }

    .bg-glow--1 {
      top: -200px;
      right: -100px;
      background: var(--gold);
      animation: float1 8s ease-in-out infinite;
    }

    .bg-glow--2 {
      bottom: -200px;
      left: -100px;
      background: #4a6cf7;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, 30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -40px); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
    }

    /* Logo / Icon */
    .compass-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2.5rem;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .compass-icon svg {
      width: 100%;
      height: 100%;
    }

    .compass-needle {
      transform-origin: center;
      animation: needleSpin 2s ease-out forwards 0.5s;
    }

    @keyframes needleSpin {
      0% { transform: rotate(-180deg); }
      70% { transform: rotate(15deg); }
      85% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      border: 1px solid rgba(201, 169, 110, 0.25);
      background: rgba(201, 169, 110, 0.08);
      color: var(--gold-light);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Heading */
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .heading em {
      font-style: normal;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), #b8924e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle */
    .subtitle {
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    /* CTA Button */
    .cta-wrapper {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #e4cfa0, #dbb86e);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(201, 169, 110, 0.3),
        0 2px 10px rgba(201, 169, 110, 0.2);
    }

    .cta:hover::before {
      opacity: 1;
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta span,
    .cta svg {
      position: relative;
      z-index: 1;
    }

    .cta svg {
      transition: transform 0.3s ease;
    }

    .cta:hover svg {
      transform: translateX(4px);
    }

    /* Divider line */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 3rem auto 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    .footer-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
    }

    .footer-text strong {
      color: var(--text);
      font-weight: 500;
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0);
      }
      10% {
        opacity: 0.6;
        transform: scale(1);
      }
      90% {
        opacity: 0.2;
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) scale(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .subtitle {
        font-size: 1rem;
      }

      .cta {
        padding: 0.875rem 2rem;
        font-size: 0.925rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="particles" id="particles"></div>

  <div class="container">

    <!-- Compass Icon -->
    <div class="compass-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" stroke="#c9a96e" stroke-width="1.5" opacity="0.3"/>
        <circle cx="50" cy="50" r="38" stroke="#c9a96e" stroke-width="0.75" opacity="0.15"/>
        <!-- Cardinal marks -->
        <line x1="50" y1="6" x2="50" y2="14" stroke="#c9a96e" stroke-width="1.5" opacity="0.5"/>
        <line x1="50" y1="86" x2="50" y2="94" stroke="#c9a96e" stroke-width="1.5" opacity="0.5"/>
        <line x1="6" y1="50" x2="14" y2="50" stroke="#c9a96e" stroke-width="1.5" opacity="0.5"/>
        <line x1="86" y1="50" x2="94" y2="50" stroke="#c9a96e" stroke-width="1.5" opacity="0.5"/>
        <!-- Needle -->
        <g class="compass-needle">
          <polygon points="50,18 54,50 50,54 46,50" fill="#c9a96e"/>
          <polygon points="50,82 54,50 50,46 46,50" fill="#8a8a95" opacity="0.4"/>
        </g>
        <circle cx="50" cy="50" r="3" fill="#c9a96e"/>
      </svg>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Novo endereco
    </div>

    <h1 class="heading">
      O Compass esta<br>de <em>casa nova</em>
    </h1>

    <p class="subtitle">
      Evoluimos para oferecer uma experiencia ainda melhor.
      Acesse agora nosso novo endereco e continue navegando.
    </p>

    <div class="cta-wrapper">
      <a href="https://compass.igcp.com.br" class="cta">
        <span>Acessar o novo Compass</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="m12 5 7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="divider"></div>
    <p class="footer-text"><strong>IGC Partners</strong> &mdash; Compass Dealflow Platform</p>

  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    const count = 20;

    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = (60 + Math.random() * 40) + '%';
      particle.style.animationDuration = (6 + Math.random() * 10) + 's';
      particle.style.animationDelay = (Math.random() * 8) + 's';
      particle.style.width = particle.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(particle);
    }
  </script>
</body>
</html>
